name: polinema_care
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1 
  cupertino_icons: ^1.0.8
  go_router: ^17.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  camerawesome: ^2.1.0
  geolocator: ^14.0.2
  http: ^1.6.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/POLINEMA_CARE.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/POLINEMA_CARE.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  android_12:
    icon_background_color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/POLINEMA_CARE.png

